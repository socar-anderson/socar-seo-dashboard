<title>컨텐츠 특공대 소재 성과 대시보드</title>
<script src="creative-data.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; }

  .page { max-width: 1200px; margin: 0 auto; padding: 24px 20px 48px; }

  .header { margin-bottom: 28px; }
  .header h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; letter-spacing: -0.3px; }
  .header-meta { display: flex; align-items: center; gap: 16px; margin-top: 6px; flex-wrap: wrap; }
  .header-meta span { font-size: 13px; color: #6b7280; }
  .header-meta .sep { color: #d1d5db; }

  .kpi-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 32px; }
  .kpi { background: #fff; border-radius: 12px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .kpi-label { font-size: 12px; color: #6b7280; font-weight: 500; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .kpi-value { font-size: 26px; font-weight: 700; color: #1a1a2e; letter-spacing: -0.5px; }
  .kpi-unit { font-size: 16px; font-weight: 500; color: #9ca3af; }
  .kpi-sub { font-size: 12px; color: #9ca3af; margin-top: 3px; }

  .section { margin-bottom: 32px; }
  .section-title { font-size: 13px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }

  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }

  .card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); transition: box-shadow .15s; }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
  .card-name { font-size: 15px; font-weight: 700; color: #1a1a2e; }
  .card-group { font-size: 11px; color: #9ca3af; font-weight: 500; margin-top: 2px; }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; background: #f3f4f6; color: #6b7280; }

  .roas-row { margin-bottom: 14px; }
  .roas-label-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
  .roas-title { font-size: 11px; color: #9ca3af; font-weight: 500; }
  .roas-num { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: #1a1a2e; }
  .bar-track { background: #f3f4f6; border-radius: 4px; height: 7px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; background: #4b5563; }

  .revenue-box { background: #f8f9fa; border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; }
  .revenue-label { display: block; font-size: 11px; color: #9ca3af; font-weight: 500; margin-bottom: 4px; }
  .revenue-value { font-size: 20px; font-weight: 800; color: #1a1a2e; letter-spacing: -0.5px; }
  .revenue-unit { font-size: 13px; font-weight: 500; color: #6b7280; margin-left: 2px; }

  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; padding-top: 14px; border-top: 1px solid #f3f4f6; }
  .metric-label { font-size: 11px; color: #9ca3af; font-weight: 500; margin-bottom: 2px; }
  .metric-value { font-size: 14px; font-weight: 600; color: #374151; }
  .metric-value.highlight { color: #1a1a2e; font-size: 15px; }

  .media-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 2px; }
  .chip { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px; background: #f3f4f6; color: #6b7280; }
  .chip.tt { background: #fce4ec; color: #c62828; }
  .chip.fb { background: #e8eaf6; color: #283593; }
  .media-note { font-size: 10px; color: #9ca3af; align-self: center; }

  .footnote { font-size: 12px; color: #9ca3af; margin-top: 28px; border-top: 1px solid #e5e7eb; padding-top: 16px; line-height: 1.8; }

  @media (max-width: 600px) {
    .kpi-strip { grid-template-columns: 1fr 1fr; }
  }
</style>

<div class="page">
  <div class="header">
    <h1>컨텐츠 특공대 소재 성과 대시보드</h1>
    <div class="header-meta" id="header-meta"></div>
  </div>
  <div class="kpi-strip" id="kpi-strip"></div>
  <div id="sections"></div>
  <div class="footnote">
    * 매출 = Airbridge mmp_value (광고 귀인 기준, 실제 결제 금액과 다를 수 있음)<br>
    * ROAS = mmp_value ÷ 집행금액 × 100 (날짜별 비용·매출 매칭, WBR 동일 기준)<br>
    * ROAS 바 스케일: 0 ~ 2,500% | 전체 캠페인 WBR 평균 ROAS: ~880% (W25~26 기준)
  </div>
</div>

<script>
  function fmt(n) { return Number(n).toLocaleString('ko-KR'); }

  function formatRevenue(man) {
    if (man >= 10000) {
      const ok = Math.floor(man / 10000);
      const rem = man % 10000;
      if (rem === 0) return `<span class="revenue-value">${fmt(ok)}<span class="revenue-unit">억원</span></span>`;
      return `<span class="revenue-value">${fmt(ok)}억 ${fmt(rem)}<span class="revenue-unit">만원</span></span>`;
    }
    return `<span class="revenue-value">${fmt(man)}<span class="revenue-unit">만원</span></span>`;
  }

  function renderCard(c) {
    const barPct = Math.min(100, (c.roas / 2500) * 100).toFixed(1);
    const stopped = c.id === 'blacklabel-parkinglot' ? ' 중단' : '';
    const period = `${c.firstDate.slice(5)}~${c.lastDate.slice(5)} (${c.days}일)${stopped}`;
    const chips = c.media.map(m => `<span class="chip ${m.cls}">${m.name} ${m.pct}%</span>`).join('');
    const note = c.mediaNote ? `<span class="media-note">${c.mediaNote}</span>` : '';
    return `
      <div class="card">
        <div class="card-header">
          <div>
            <div class="card-name">${c.name}</div>
            <div class="card-group">${c.group}</div>
          </div>
          <span class="badge">${c.badge}</span>
        </div>
        <div class="roas-row">
          <div class="roas-label-row">
            <span class="roas-title">ROAS</span>
            <span class="roas-num">${fmt(c.roas)}%</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${barPct}%"></div></div>
        </div>
        <div class="revenue-box">
          <span class="revenue-label">이 소재가 만든 매출</span>
          ${formatRevenue(c.revenueMan)}
        </div>
        <div class="metrics">
          <div class="metric">
            <div class="metric-label">집행금액</div>
            <div class="metric-value highlight">${c.costMan.toLocaleString()}만원</div>
          </div>
          <div class="metric">
            <div class="metric-label">예약 수</div>
            <div class="metric-value highlight">${fmt(c.cnt)}건</div>
          </div>
          <div class="metric">
            <div class="metric-label">건당 매출</div>
            <div class="metric-value">${fmt(c.valuePerCnt)}원</div>
          </div>
          <div class="metric">
            <div class="metric-label">집행기간</div>
            <div class="metric-value">${period}</div>
          </div>
          <div class="metric" style="grid-column:1/-1">
            <div class="metric-label">집행매체</div>
            <div class="media-chips">${chips}${note}</div>
          </div>
        </div>
      </div>`;
  }

  function render() {
    const d = CREATIVE_DATA;
    const groupLabels = {
      "diorama-2605": "diorama-2605 · 4종",
      "blacklabel-2605": "blacklabel-2605 · 4종",
      "stressfree-2605": "stressfree-2605 · 1종"
    };

    document.getElementById('header-meta').innerHTML = `
      <span>집행 기간: ${d.meta.queryStart} ~ ${d.meta.queryEnd}</span>
      <span class="sep">|</span>
      <span>분석 기준: Airbridge mmp_value (날짜별 비용·매출 매칭)</span>
      <span class="sep">|</span>
      <span>데이터 기준일: ${d.meta.lastUpdated}</span>`;

    const s = d.summary;
    document.getElementById('kpi-strip').innerHTML = `
      <div class="kpi">
        <div class="kpi-label">총 집행금액</div>
        <div class="kpi-value">${fmt(s.totalCostMan)}<span class="kpi-unit">만원</span></div>
        <div class="kpi-sub">${d.creatives.length}개 소재 합산</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">총 발생 매출</div>
        <div class="kpi-value">${fmt(s.totalRevenueMan)}<span class="kpi-unit">만원</span></div>
        <div class="kpi-sub">mmp_value 합산 (Airbridge 귀인)</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">블렌드 ROAS</div>
        <div class="kpi-value">${fmt(s.blendRoas)}<span class="kpi-unit">%</span></div>
        <div class="kpi-sub">전체 캠페인 WBR 평균 ~880% 대비</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">총 예약 수</div>
        <div class="kpi-value">${fmt(s.totalCnt)}<span class="kpi-unit">건</span></div>
        <div class="kpi-sub">mmp_cnt (Airbridge 귀인)</div>
      </div>`;

    let html = '';
    for (const g of d.groups) {
      const cards = d.creatives.filter(c => c.group === g);
      html += `
        <div class="section">
          <div class="section-title">${groupLabels[g] || g}</div>
          <div class="card-grid">${cards.map(renderCard).join('')}</div>
        </div>`;
    }
    document.getElementById('sections').innerHTML = html;
  }

  render();
</script>
