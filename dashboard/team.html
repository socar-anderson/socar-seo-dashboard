<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쏘카 블로그 팀 성과 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="data.js"></script>
  <style>
    :root {
      --bg: #0B1120;
      --surface: #151F30;
      --surface2: #1C2A40;
      --surface3: #243048;
      --primary: #3B82F6;
      --primary-dim: rgba(59,130,246,0.15);
      --success: #22C55E;
      --success-dim: rgba(34,197,94,0.12);
      --warning: #F59E0B;
      --danger: #EF4444;
      --text: #E2E8F0;
      --text-muted: #94A3B8;
      --text-dim: #64748B;
      --border: #1E2D42;
      --border2: #2D3F58;
      --socar-blue: #1E56D6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', sans-serif; font-size: 14px; line-height: 1.5; }

    header {
      background: linear-gradient(135deg, #0F1C2E 0%, #0B1120 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo { width: 28px; height: 28px; background: var(--socar-blue); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 11px; color: #fff; }
    header h1 { font-size: 16px; font-weight: 700; }
    header h1 span { color: var(--primary); }
    .header-right { display: flex; gap: 8px; align-items: center; }
    .nav-link { color: var(--text-muted); text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 13px; transition: all 0.15s; }
    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .nav-link.active { color: var(--text); background: var(--surface3); }
    .badge { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--text-muted); }
    .badge strong { color: var(--text); }

    .container { max-width: 1280px; margin: 0 auto; padding: 0 24px 60px; }
    .section { margin-top: 32px; }
    .section-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .section-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); }
    .section-title .meta { font-size: 12px; color: var(--text-dim); font-weight: 400; margin-left: 4px; }

    /* 팀 요약 카드 */
    .team-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 20px; }
    .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; }
    .summary-card-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .summary-card-value { font-size: 24px; font-weight: 700; color: var(--text); }
    .summary-card-value span { font-size: 13px; font-weight: 400; color: var(--text-muted); margin-left: 4px; }

    /* 작성자 카드 그리드 */
    .author-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 16px;
      margin-top: 14px;
    }
    .author-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.15s;
      cursor: pointer;
    }
    .author-card:hover { border-color: var(--primary); transform: translateY(-1px); }
    .author-card.missing { opacity: 0.55; cursor: default; }
    .author-card.missing:hover { transform: none; border-color: var(--border); }
    .author-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .author-name {
      font-size: 16px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    .author-name .avatar {
      width: 32px; height: 32px;
      border-radius: 50%; background: var(--primary-dim);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: var(--primary);
      text-transform: uppercase;
    }
    .post-count {
      font-size: 12px; color: var(--text-muted);
      background: var(--surface2); padding: 3px 10px; border-radius: 12px;
    }
    .author-stats {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
      margin-bottom: 16px;
    }
    .stat {
      background: var(--surface2); border-radius: 8px; padding: 10px 12px;
    }
    .stat-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
    .stat-value { font-size: 18px; font-weight: 700; color: var(--text); }
    .stat-value span { font-size: 11px; color: var(--text-muted); margin-left: 3px; }

    .author-chart {
      background: var(--surface2); border-radius: 8px; padding: 8px 12px;
      height: 100px;
    }

    .missing-msg {
      color: var(--text-dim); font-size: 13px;
      padding: 30px 0; text-align: center;
    }

    /* 상세 페이지 테이블 */
    .detail-section { display: none; margin-top: 32px; }
    .detail-section.open { display: block; }
    .detail-back {
      cursor: pointer; color: var(--primary); font-size: 13px;
      display: inline-flex; align-items: center; gap: 4px;
      margin-bottom: 12px; user-select: none;
    }
    .detail-back:hover { text-decoration: underline; }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: var(--surface2); padding: 10px 12px; text-align: left; font-size: 12px; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    td { padding: 12px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text); }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: var(--surface2); }
    .url-cell a { color: var(--primary); text-decoration: none; }
    .url-cell a:hover { text-decoration: underline; }
    .pos-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .pos-top { background: rgba(34,197,94,0.15); color: #22C55E; }
    .pos-mid { background: rgba(245,158,11,0.15); color: #F59E0B; }
    .pos-low { background: rgba(239,68,68,0.15); color: #EF4444; }

    .empty { text-align: center; padding: 40px 20px; color: var(--text-dim); }

    @media (max-width: 768px) {
      .team-summary { grid-template-columns: repeat(2, 1fr); }
      .author-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">S</div>
    <h1>쏘카 블로그 <span>팀 성과</span></h1>
  </div>
  <div class="header-right">
    <a class="nav-link" href="./index.html">전체</a>
    <a class="nav-link active" href="./team.html">팀</a>
    <div class="badge">기준 <strong id="period-badge">-</strong></div>
    <div class="badge">최종 갱신 <strong id="last-updated">-</strong></div>
  </div>
</header>

<div class="container">

  <!-- 팀 요약 -->
  <div class="section">
    <div class="section-title">
      <div class="dot"></div>팀 요약
      <span class="meta" id="team-period-label">최근 7일 합계</span>
    </div>
    <div class="team-summary">
      <div class="summary-card">
        <div class="summary-card-label">총 노출수 (팀)</div>
        <div class="summary-card-value" id="team-total-imp">-</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">총 클릭수 (팀)</div>
        <div class="summary-card-value" id="team-total-clicks">-</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">팀 블로그 글 수</div>
        <div class="summary-card-value" id="team-total-posts">-<span>개</span></div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">활성 작성자</div>
        <div class="summary-card-value" id="team-active-authors">-<span>명</span></div>
      </div>
    </div>
  </div>

  <!-- 작성자 카드 그리드 -->
  <div class="section" id="author-list-section">
    <div class="section-title">
      <div class="dot"></div>작성자별 성과
      <span class="meta">카드 클릭 시 상세 페이지 확인</span>
    </div>
    <div class="author-grid" id="author-grid">
      <div class="empty">로딩 중...</div>
    </div>
  </div>

  <!-- 작성자 상세 -->
  <div class="detail-section" id="author-detail">
    <span class="detail-back" onclick="closeDetail()">← 작성자 목록으로</span>
    <div class="section-title">
      <div class="dot"></div><span id="detail-author-name">-</span> 상세
      <span class="meta" id="detail-author-meta">-</span>
    </div>
    <div class="table-wrap" style="margin-top:14px">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>페이지</th>
            <th>순위</th>
            <th>노출</th>
            <th>클릭</th>
            <th>CTR</th>
          </tr>
        </thead>
        <tbody id="detail-pages-body">
          <tr><td colspan="6" class="empty">데이터 없음</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
  const d = typeof SEO_DATA !== 'undefined' ? SEO_DATA : null;
  const authorCharts = {};  // chart instances

  if (!d) {
    document.body.innerHTML = '<div style="text-align:center;padding:80px;color:#94A3B8;">data.js 파일을 찾을 수 없습니다.</div>';
  } else {
    document.getElementById('last-updated').textContent = d.meta.lastUpdated || '-';
    document.getElementById('period-badge').innerHTML = `<strong>${d.meta.period7d || ''}</strong>`;
    document.getElementById('team-period-label').textContent = d.meta.period7d ? `최근 7일 (${d.meta.period7d})` : '최근 7일 합계';

    const authorsBlock = d.authors || { authors: [], missingAuthors: [] };
    const authors = authorsBlock.authors || [];

    // 팀 요약 계산
    const totalImp = authors.reduce((sum, a) => sum + (a.totalImpressions || 0), 0);
    const totalClicks = authors.reduce((sum, a) => sum + (a.totalClicks || 0), 0);
    const totalPosts = authors.reduce((sum, a) => sum + (a.totalPosts || 0), 0);
    const activeCount = authors.filter(a => a.totalPosts > 0).length;

    document.getElementById('team-total-imp').textContent = totalImp.toLocaleString();
    document.getElementById('team-total-clicks').textContent = totalClicks.toLocaleString();
    document.getElementById('team-total-posts').innerHTML = `${totalPosts}<span>개</span>`;
    document.getElementById('team-active-authors').innerHTML = `${activeCount}<span>/ ${authors.length}명</span>`;

    // 작성자 카드 렌더
    const grid = document.getElementById('author-grid');
    if (authors.length === 0) {
      grid.innerHTML = '<div class="empty">작성자 데이터 없음</div>';
    } else {
      // 노출 순으로 정렬 (글 없는 사람은 맨 뒤)
      const sorted = [...authors].sort((a, b) => {
        if (a.totalPosts === 0 && b.totalPosts > 0) return 1;
        if (b.totalPosts === 0 && a.totalPosts > 0) return -1;
        return b.totalImpressions - a.totalImpressions;
      });

      grid.innerHTML = sorted.map(a => {
        const isMissing = a.totalPosts === 0;
        const chartId = `chart-${a.name.replace(/[^a-zA-Z0-9]/g, '')}`;
        return `
          <div class="author-card ${isMissing ? 'missing' : ''}" ${isMissing ? '' : `onclick="openDetail('${a.name}')"`}>
            <div class="author-header">
              <div class="author-name">
                <div class="avatar">${a.name.charAt(0)}</div>
                ${a.name}
              </div>
              <div class="post-count">${a.totalPosts}개 글</div>
            </div>
            ${isMissing ? `
              <div class="missing-msg">아직 작성한 글이 없습니다.</div>
            ` : `
              <div class="author-stats">
                <div class="stat">
                  <div class="stat-label">총 노출 (7일)</div>
                  <div class="stat-value">${(a.totalImpressions || 0).toLocaleString()}</div>
                </div>
                <div class="stat">
                  <div class="stat-label">총 클릭 (7일)</div>
                  <div class="stat-value">${(a.totalClicks || 0).toLocaleString()}</div>
                </div>
                <div class="stat">
                  <div class="stat-label">평균 순위</div>
                  <div class="stat-value">${a.avgPosition || 0}<span>위</span></div>
                </div>
                <div class="stat">
                  <div class="stat-label">평균 CTR</div>
                  <div class="stat-value">${a.avgCTR || 0}<span>%</span></div>
                </div>
              </div>
              <div class="author-chart">
                <canvas id="${chartId}"></canvas>
              </div>
            `}
          </div>
        `;
      }).join('');

      // 차트 렌더 (글 있는 작성자만)
      sorted.filter(a => a.totalPosts > 0).forEach(a => {
        const chartId = `chart-${a.name.replace(/[^a-zA-Z0-9]/g, '')}`;
        const canvas = document.getElementById(chartId);
        if (!canvas) return;
        const daily = a.dailyHistory || [];
        if (daily.length === 0) return;
        authorCharts[a.name] = new Chart(canvas, {
          type: 'line',
          data: {
            labels: daily.map(d => d.date.slice(5)),
            datasets: [{
              data: daily.map(d => d.impressions),
              borderColor: '#3B82F6',
              backgroundColor: 'rgba(59,130,246,0.1)',
              tension: 0.3, fill: true, pointRadius: 2,
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { displayColors: false } },
            scales: {
              x: { display: false },
              y: { display: false, beginAtZero: false },
            }
          }
        });
      });
    }
  }

  function openDetail(authorName) {
    const a = (d.authors.authors || []).find(x => x.name === authorName);
    if (!a) return;
    document.getElementById('author-list-section').style.display = 'none';
    document.getElementById('author-detail').classList.add('open');
    document.getElementById('detail-author-name').textContent = authorName;
    document.getElementById('detail-author-meta').textContent =
      `글 ${a.totalPosts}개 · 노출 ${(a.totalImpressions||0).toLocaleString()} · 클릭 ${(a.totalClicks||0).toLocaleString()}`;

    const tbody = document.getElementById('detail-pages-body');
    if (!a.pages || a.pages.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">페이지별 데이터 없음 (노출 0)</td></tr>';
    } else {
      tbody.innerHTML = a.pages.map((p, i) => {
        const posCls = p.position <= 10 ? 'pos-top' : p.position <= 20 ? 'pos-mid' : 'pos-low';
        return `<tr>
          <td style="color:var(--text-dim)">${i + 1}</td>
          <td class="url-cell"><a href="${p.url}" target="_blank">${p.slug}</a></td>
          <td><span class="pos-badge ${posCls}">${p.position}위</span></td>
          <td>${p.impressions.toLocaleString()}</td>
          <td>${p.clicks.toLocaleString()}</td>
          <td>${p.ctr}%</td>
        </tr>`;
      }).join('');
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function closeDetail() {
    document.getElementById('author-detail').classList.remove('open');
    document.getElementById('author-list-section').style.display = '';
  }
</script>
</body>
</html>
